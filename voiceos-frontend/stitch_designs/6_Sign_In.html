<body class="bg-surface text-on-surface min-h-screen flex flex-col justify-center items-center px-md py-xxl">

<!-- Main Content Canvas -->

<!-- Identity Header -->

<div class="relative">
<input class="w-full h-[48px] px-md rounded-lg border border-outline-variant bg-surface focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-md text-body-md" id="password" name="password" placeholder="••••••••" type="password"/>

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            const submitBtn = form.querySelector('button[type="submit"]');

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                submitBtn.innerHTML = `
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Authenticating...
                `;
                submitBtn.disabled = true;
                
                // Simulate network latency
                setTimeout(() => {
                    submitBtn.classList.remove('bg-primary');
                    submitBtn.classList.add('bg-green-600');
                    submitBtn.innerHTML = `<span class="material-symbols-outlined mr-xs">check_circle</span> Welcome to VoiceOS`;
                }, 1500);
            });

            // Password Toggle logic
            const togglePass = document.querySelector('button .material-symbols-outlined');
            const passInput = document.querySelector('#password');
            let visible = false;
            
            togglePass.parentElement.addEventListener('click', () => {
                visible = !visible;
                passInput.type = visible ? 'text' : 'password';
                togglePass.textContent = visible ? 'visibility_off' : 'visibility';
            });
        });
    </script>
