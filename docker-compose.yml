version: '3.9'

services:
  # ─── PostgreSQL 15 with pgvector ───────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: voiceos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: voiceos
      POSTGRES_PASSWORD: voiceos_password
      POSTGRES_DB: voiceos_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voiceos -d voiceos_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: voiceos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── RedisInsight (Redis GUI) ──────────────────────────────
  redis-insight:
    image: redis/redisinsight:latest
    container_name: voiceos_redis_insight
    restart: unless-stopped
    ports:
      - '8001:5540'
    depends_on:
      - redis

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
